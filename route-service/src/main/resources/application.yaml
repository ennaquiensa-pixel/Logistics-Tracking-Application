spring:
  application:
    name: route-service

  # Redis Configuration - Spring Boot will auto-configure Jedis
  redis:
    host: redis-15554.crce176.me-central-1-1.ec2.cloud.redislabs.com
    port: 15554
    password: dMW4qSHV7jJVJiT8yQ3CaWa2EHE8HLLO
    username: default
    ssl: true
    timeout: 10000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 2000ms

  cache:
    type: simple
#    redis:
#      time-to-live: 3600000
#      cache-null-values: false

  # Retry Configuration
  retry:
    max-attempts: 3
    backoff:
      delay: 1000
      multiplier: 2.0

  # Eureka Client
  cloud:
    loadbalancer:
      enabled: true

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: false

# OpenRouteService Configuration
openrouteservice:
  api:
    key: ${ORS_API_KEY:eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjVkMWM0YTJhYjM3NzRkOTBiZTBjNDE2YTEyMmU5NTZmIiwiaCI6Im11cm11cjY0In0=}
    url: https://api.openrouteservice.org
  max-distance: 500000.0 # 500 km in meters

# Pricing Calculator Configuration
pricing:
  base-rate-per-km: 2.5
  fuel-price-per-liter: 15.0
  fuel-consumption-per-100km: 8.0
  co2-emission-per-km: 0.12
  eco-rate-multiplier: 0.8
  express-rate-multiplier: 1.3

# Route Configuration
route:
  average-speed: 50.0
  max-distance: 1000.0 # km

# Logging Configuration
logging:
  level:
    com.logistics.route_service: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.retry: DEBUG
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"