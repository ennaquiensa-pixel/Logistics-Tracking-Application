eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

jwt:
  secret: DFGHJKIUYTRTYUkk58855dsdsddbhdbhfd2548dhyddbchdufhdisddhsduddssdIOPLKJH123456789ABCDEFGH
  expiration: 86400000       # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info




